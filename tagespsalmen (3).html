PSALMEN[121]={sup:"Ein Wallfahrtslied.",v:[[1,"Ich hebe meine Augen auf zu den Bergen. Woher kommt mir Hilfe?"],[2,"Meine Hilfe kommt vom HERRN, der Himmel und Erde gemacht hat."],[3,"Er wird deinen Fuß nicht gleiten lassen, und der dich behütet, schläft nicht."],[4,"Siehe, der Hüter Israels schläft und schlummert nicht."],[5,"Der HERR behütet dich; der HERR ist dein Schatten über deiner rechten Hand,"],[6,"dass dich des Tages die Sonne nicht steche noch der Mond des Nachts."],[7,"Der HERR behüte dich vor allem Übel, er behüte deine Seele."],[8,"Der HERR behüte deinen Ausgang und Eingang von nun an bis in Ewigkeit."]]};

PSALMEN[122]={sup:"Ein Wallfahrtslied Davids.",v:[[1,"Ich freute mich, als man mir sagte: Wir wollen zum Hause des HERRN gehen."],[2,"Nun stehen unsre Füße in deinen Toren, Jerusalem."],[3,"Jerusalem ist gebaut als eine Stadt, die fest zusammengefügt ist,"],[4,"wohin die Stämme hinaufziehen, die Stämme des HERRN, wie es geboten ist Israel, den Namen des HERRN zu loben."],[5,"Denn dort stehen die Throne des Gerichts, die Throne des Hauses David."],[6,"Wünschet Jerusalem Frieden! Es möge wohl gehen denen, die dich lieben."],[7,"Friede sei in deinen Mauern und Glück in deinen Palästen!"],[8,"Um meiner Brüder und Freunde willen will ich dir Frieden zurufen."],[9,"Um des Hauses des HERRN, unsres Gottes, willen will ich dein Bestes suchen."]]};

PSALMEN[126]={sup:"Ein Wallfahrtslied.",v:[[1,"Als der HERR das Geschick Zions wendete, da waren wir wie die Träumenden."],[2,"Da ward unser Mund voll Lachens und unsre Zunge voll Rühmens. Da sprach man unter den Völkern: Der HERR hat Großes an ihnen getan!"],[3,"Der HERR hat Großes an uns getan; des sind wir fröhlich."],[4,"HERR, wende unser Geschick wie du die Bäche wiederbringst im Südland."],[5,"Die mit Tränen säen, werden mit Freuden ernten."],[6,"Sie gehen hin und weinen und tragen edlen Samen und kommen mit Freuden und bringen ihre Garben."]]};

PSALMEN[130]={sup:"Ein Wallfahrtslied.",v:[[1,"Aus der Tiefe rufe ich, HERR, zu dir."],[2,"Herr, höre meine Stimme! Lass deine Ohren merken auf die Stimme meines Flehens!"],[3,"Wenn du, HERR, Sünden anrechnen willst – Herr, wer wird bestehen?"],[4,"Aber bei dir ist Vergebung, dass man dich fürchte."],[5,"Ich harre auf den HERRN, meine Seele harret, und ich hoffe auf sein Wort."],[6,"Meine Seele wartet auf den Herrn mehr als die Wächter auf den Morgen, die Wächter auf den Morgen."],[7,"Israel, hoffe auf den HERRN! Denn bei dem HERRN ist die Güte und viel Erlösung bei ihm."],[8,"Und er wird Israel erlösen aus allen seinen Sünden."]]};

PSALMEN[131]={sup:"Ein Wallfahrtslied Davids.",v:[[1,"HERR, mein Herz ist nicht hoffärtig, und meine Augen sind nicht hochmütig; ich wandle nicht in großen Dingen, die mir zu wunderbar sind."],[2,"Wahrlich, ich habe meine Seele still und ruhig gemacht, wie ein entwöhntes Kind bei seiner Mutter; wie ein entwöhntes Kind, so ist meine Seele bei mir."],[3,"Israel, harre auf den HERRN, von nun an bis in Ewigkeit!"]]};

PSALMEN[136]={sup:"",v:[[1,"Danket dem HERRN, denn er ist freundlich, denn seine Güte währet ewiglich."],[2,"Danket dem Gott aller Götter, denn seine Güte währet ewiglich."],[3,"Danket dem Herrn aller Herren, denn seine Güte währet ewiglich."],[4,"Der allein große Wunder tut, denn seine Güte währet ewiglich."],[5,"Der die Himmel mit Verstand gemacht hat, denn seine Güte währet ewiglich."],[6,"Der die Erde über dem Wasser ausgebreitet hat, denn seine Güte währet ewiglich."],[7,"Der die großen Lichter gemacht hat, denn seine Güte währet ewiglich."],[8,"die Sonne, dass sie des Tages herrsche, denn seine Güte währet ewiglich;"],[9,"den Mond und die Sterne, dass sie des Nachts herrschen, denn seine Güte währet ewiglich."],[23,"Der an uns gedacht hat in unsrer Niedrigkeit, denn seine Güte währet ewiglich."],[24,"und uns von unsern Feinden erlöst hat, denn seine Güte währet ewiglich."],[25,"Der allen Fleisch Speise gibt, denn seine Güte währet ewiglich."],[26,"Danket dem Gott des Himmels, denn seine Güte währet ewiglich."]]};

PSALMEN[138]={sup:"Von David.",v:[[1,"Ich danke dir von ganzem Herzen; vor den Göttern will ich dir lobsingen."],[2,"Ich will mich niederwerfen vor deinem heiligen Tempel und deinem Namen danken um deiner Gnade und Treue willen; denn du hast dein Wort über alles herrlich gemacht."],[3,"Wenn ich dich anrufe, erhörst du mich; du machst mir in der Seele Kraft."],[4,"Es werden dir danken, HERR, alle Könige der Erde; denn sie hören die Worte deines Mundes."],[5,"Sie werden singen von den Wegen des HERRN, denn groß ist die Herrlichkeit des HERRN."],[6,"Der HERR ist hoch und schaut auf die Niedrigen; die Hoffärtigen kennt er von fern."],[7,"Ich wandle mitten in Angst; du erquickst mich und streckst deine Hand aus gegen den Zorn meiner Feinde und hilfst mir mit deiner Rechten."],[8,"Der HERR wird's vollenden an mir. Herr, deine Güte währet ewig; verlass nicht die Werke deiner Hände!"]]};

PSALMEN[139]={sup:"Dem Chorleiter. Ein Psalm Davids.",v:[[1,"HERR, du erforschest mich und kennest mich."],[2,"Ich sitze oder stehe auf, so weißt du es; du verstehst meine Gedanken von ferne."],[3,"Ich gehe oder liege, so bist du um mich und siehst alle meine Wege."],[4,"Denn sieh, es ist kein Wort auf meiner Zunge, das du, HERR, nicht schon wüsstest."],[5,"Von allen Seiten umgibst du mich und hältst deine Hand über mir."],[6,"Diese Erkenntnis ist mir zu wunderbar und zu hoch; ich kann sie nicht begreifen."],[7,"Wo soll ich hingehen vor deinem Geist, und wo soll ich hinfliehen vor deinem Angesicht?"],[8,"Führe ich in den Himmel, so bist du da; bettete ich mich bei den Toten, so bist du auch da."],[9,"Nähme ich Flügel der Morgenröte und bliebe am äußersten Meer,"],[10,"so würde doch deine Hand mich führen und deine Rechte mich halten."],[11,"Spräche ich: Finsternis soll mich decken und Nacht statt Licht um mich sein –"],[12,"so ist auch Finsternis nicht finster bei dir, und die Nacht leuchtet wie der Tag; Finsternis und Licht ist einerlei."],[13,"Denn du hast meine Nieren bereitet und hast mich gebildet im Mutterleib."],[14,"Ich danke dir dafür, dass ich wunderbar gemacht bin; wunderbar sind deine Werke; das erkennt meine Seele."],[17,"Wie schwer sind für mich, Gott, deine Gedanken! Wie viele ihrer sind!"],[18,"Wollte ich sie zählen, so sind ihrer mehr als des Sandes; wenn ich aufwache, bin ich noch bei dir."],[23,"Erforsche mich, Gott, und erkenne mein Herz; prüfe mich und erkenne, wie ich's meine."],[24,"Und sieh, ob ich auf bösem Wege bin, und leite mich auf ewigem Wege."]]};

PSALMEN[143]={sup:"Ein Psalm Davids.",v:[[1,"HERR, höre mein Gebet, vernimm mein Flehen um deiner Treue willen; erhöre mich um deiner Gerechtigkeit willen!"],[2,"Und geh nicht ins Gericht mit deinem Knecht; denn vor dir ist kein Lebendiger gerecht."],[3,"Der Feind verfolgt meine Seele und schlägt mein Leben zu Boden; er stößt mich in die Finsternis wie die Toten von alters."],[4,"Mein Geist ist in mir verschmachtet, mein Herz in mir erschrocken."],[5,"Ich denke an die alten Zeiten; ich sinne nach über all deine Werke und rede von deinen Taten."],[6,"Ich breite meine Hände aus zu dir; meine Seele dürstet nach dir wie dürres Land."],[7,"HERR, erhöre mich bald, mein Geist vergeht. Verbirg dein Angesicht nicht vor mir, ich wäre denen gleich, die in die Grube fahren."],[8,"Lass mich in der Frühe deine Gnade hören; denn ich hoffe auf dich. Lass mich wissen den Weg, den ich gehen soll; denn zu dir erhebe ich meine Seele."],[10,"Lehre mich tun nach deinem Wohlgefallen, denn du bist mein Gott; dein guter Geist führe mich auf ebener Bahn."],[11,"HERR, erquicke mich um deines Namens willen; führe meine Seele aus der Not durch deine Gerechtigkeit!"]]};

PSALMEN[145]={sup:"Lobgesang Davids.",v:[[1,"Ich will dich erheben, mein Gott, du König, und deinen Namen loben immer und ewiglich."],[2,"Ich will dich täglich loben und deinen Namen rühmen immer und ewiglich."],[3,"Der HERR ist groß und sehr zu loben, und seine Größe ist nicht zu erforschen."],[4,"Ein Geschlecht preist dem anderen deine Werke und verkündigt deine Macht."],[5,"Ich will über die herrliche Schönheit deiner Würde nachsinnen und deine Wunder erzählen."],[6,"Man wird reden von der Kraft deiner erschrecklichen Taten, und ich will deine Größe erzählen."],[7,"Das Gedächtnis deiner großen Güte werden sie ausbreiten, und man wird deine Gerechtigkeit rühmen."],[8,"Der HERR ist gnädig und barmherzig, geduldig und von großer Güte."],[9,"Der HERR ist gut an allen Orten und erbarmt sich aller seiner Werke."],[10,"Es sollen dir danken, HERR, alle deine Werke, und deine Heiligen sollen dich loben."],[11,"Sie sollen reden von der Herrlichkeit deines Reiches und von deiner Macht erzählen,"],[12,"damit die Menschenkinder seine großen Taten erfahren und die herrliche Pracht seines Reiches."],[13,"Dein Reich ist ein ewiges Reich, und deine Herrschaft währet für und für."],[14,"Der HERR erhält alle, die fallen, und richtet auf alle, die niedergebeugt sind."],[15,"Aller Augen warten auf dich, und du gibst ihnen ihre Speise zur rechten Zeit."],[16,"Du tust deine Hand auf und sättigst alles, was lebt, nach deinem Wohlgefallen."],[17,"Der HERR ist gerecht in allen seinen Wegen und gütig in allen seinen Werken."],[18,"Der HERR ist nahe allen, die ihn anrufen, allen, die ihn mit Ernst anrufen."],[19,"Er tut, was die Gottesfürchtigen begehren, und hört ihr Schreien und hilft ihnen."],[20,"Der HERR behütet alle, die ihn lieben, und vertilgt alle Gottlosen."],[21,"Mein Mund soll des HERRN Lob verkündigen, und alles Fleisch soll seinen heiligen Namen loben immer und ewiglich."]]};

PSALMEN[146]={sup:"",v:[[1,"Halleluja! Lobe den HERRN, meine Seele!"],[2,"Ich will den HERRN loben mein Leben lang und meinem Gott lobsingen, solange ich bin."],[3,"Vertrauet nicht auf Fürsten; sie sind Menschen und können nicht helfen."],[4,"Wenn ihr Geist ausgeht, werden sie wieder zur Erde; an demselben Tage ist es aus mit ihrem Anschlägen."],[5,"Wohl dem, dessen Helfer der Gott Jakobs ist, wessen Hoffnung auf dem HERRN, seinem Gott, steht,"],[6,"der Himmel und Erde gemacht hat, das Meer und alles, was darinnen ist, der Treue hält ewiglich,"],[7,"der dem Unterdrückten Recht schafft, der den Hungrigen Brot gibt. Der HERR befreit die Gefangenen."],[8,"Der HERR macht den Blinden sehend. Der HERR richtet auf, die niedergebeugt sind. Der HERR liebt die Gerechten."],[9,"Der HERR behütet die Fremdlinge und erhält Waisen und Witwen; aber den Weg der Gottlosen macht er krumm."],[10,"Der HERR ist König ewiglich, dein Gott, Zion, für und für. Halleluja!"]]};

PSALMEN[148]={sup:"",v:[[1,"Halleluja! Lobet den HERRN vom Himmel, lobet ihn in der Höhe!"],[2,"Lobet ihn, alle seine Engel, lobet ihn, all sein Heer!"],[3,"Lobet ihn, Sonne und Mond, lobet ihn, alle leuchtenden Sterne!"],[4,"Lobet ihn, ihr Himmel aller Himmel und das Wasser über den Himmeln!"],[5,"Die sollen loben den Namen des HERRN; denn er gebot, und sie wurden geschaffen."],[6,"Er hat sie befestigt auf ewig und ewig; er hat ein Gesetz gesetzt, das gilt ewig."],[7,"Lobet den HERRN, ihr auf Erden, ihr Meeresdrachen und alle Tiefen,"],[8,"Feuer, Hagel, Schnee, Dampf, Sturmwind, die seinen Befehl ausführen,"],[9,"Berge und alle Hügel, Fruchtbäume und alle Zedern,"],[10,"Getier und alles Vieh, Gewürm und gefiedertes Gevögel,"],[11,"Könige der Erde und alle Völker, Fürsten und alle Richter der Erde,"],[12,"Jünglinge und auch Jungfrauen, Alte mit den Jungen:"],[13,"die loben den Namen des HERRN; denn sein Name allein ist hoch, seine Herrlichkeit über Erde und Himmel."],[14,"Er erhöht das Horn seines Volkes. Das ist der Ruhm aller seiner Heiligen, der Kinder Israel, des Volkes, das ihm nahe ist. Halleluja!"]]};

PSALMEN[150]={sup:"",v:[[1,"Halleluja! Lobet Gott in seinem Heiligtum; lobet ihn in der Feste seiner Macht!"],[2,"Lobet ihn für seine Machttaten; lobet ihn nach seiner großen Herrlichkeit!"],[3,"Lobet ihn mit Posaunen; lobet ihn mit Psalter und Harfe!"],[4,"Lobet ihn mit Pauken und Reigen; lobet ihn mit Saiten und Pfeifen!"],[5,"Lobet ihn mit wohlklingenden Zimbeln; lobet ihn mit schallenden Zimbeln!"],[6,"Alles, was Odem hat, lobe den HERRN! Halleluja!"]]};

/* ═══════════════════════════════════════════
   KIRCHENJAHR-LOGIK
   ═══════════════════════════════════════════ */
const addDays = (d,n)=>{ const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const strip   = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const sameDay = (a,b) => a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const WOCHENTAGE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONATE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function osterDatum(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
        l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
        mo=Math.floor((h+l-7*m+114)/31), dy=((h+l-7*m+114)%31)+1;
  return new Date(y, mo-1, dy);
}

function erstAdvent(y) {
  for(let i=0;i<7;i++){ const d=new Date(y,10,27+i); if(d.getDay()===0) return d; }
}

function kirchenDaten(y) {
  const o=osterDatum(y);
  return {
    epiphanie: new Date(y,0,6),
    aschermittwoch: addDays(o,-46),
    palmsonntag: addDays(o,-7),
    gruendonnerstag: addDays(o,-3),
    karfreitag: addDays(o,-2),
    karsamstag: addDays(o,-1),
    ostern: o,
    ostermontag: addDays(o,1),
    weißerSonntag: addDays(o,7),
    himmelfahrt: addDays(o,39),
    pfingsten: addDays(o,49),
    pfingstmontag: addDays(o,50),
    trinitatis: addDays(o,56),
    weihnachten: new Date(y,11,25),
    advent: erstAdvent(y)
  };
}

/* ═══════════════════════════════════════════
   SAISON BESTIMMEN
   ═══════════════════════════════════════════ */
const SAISON_META = {
  advent:      { name:'Advent',          cls:'s-advent'      },
  weihnachten: { name:'Weihnachtszeit',  cls:'s-weihnachten' },
  epiphanie:   { name:'Epiphanie',       cls:'s-epiphanie'   },
  fasten:      { name:'Passionszeit',    cls:'s-fasten'      },
  karwoche:    { name:'Karwoche',        cls:'s-karwoche'    },
  ostern:      { name:'Osterzeit',       cls:'s-ostern'      },
  himmelfahrt: { name:'Himmelfahrtszeit',cls:'s-himmelfahrt' },
  pfingsten:   { name:'Pfingstzeit',     cls:'s-pfingsten'   },
  trinitatis:  { name:'Trinitatis',      cls:'s-trinitatis'  },
};

function getSaison(date) {
  const d=strip(date), y=d.getFullYear();
  const c=kirchenDaten(y), p=kirchenDaten(y-1);
  if(d>=c.advent)         return { key:'advent',      start:c.advent,       ...SAISON_META.advent };
  if(d>=c.trinitatis)     return { key:'trinitatis',  start:c.trinitatis,   ...SAISON_META.trinitatis };
  if(d>=c.pfingsten)      return { key:'pfingsten',   start:c.pfingsten,    ...SAISON_META.pfingsten };
  if(d>=c.himmelfahrt)    return { key:'himmelfahrt', start:c.himmelfahrt,  ...SAISON_META.himmelfahrt };
  if(d>=c.ostern)         return { key:'ostern',      start:c.ostern,       ...SAISON_META.ostern };
  if(d>=c.palmsonntag)    return { key:'karwoche',    start:c.palmsonntag,  ...SAISON_META.karwoche };
  if(d>=c.aschermittwoch) return { key:'fasten',      start:c.aschermittwoch,...SAISON_META.fasten };
  if(d>=c.epiphanie)      return { key:'epiphanie',   start:c.epiphanie,    ...SAISON_META.epiphanie };
  if(d>=p.weihnachten||d>=c.weihnachten) return { key:'weihnachten', start:d>=c.weihnachten?c.weihnachten:p.weihnachten, ...SAISON_META.weihnachten };
  return { key:'trinitatis', start:p.trinitatis, ...SAISON_META.trinitatis };
}

/* ═══════════════════════════════════════════
   BESONDERE TAGE
   ═══════════════════════════════════════════ */
function getBesondererTag(date) {
  const y=date.getFullYear(), m=date.getMonth(), d=date.getDate();
  const c=kirchenDaten(y);
  const beweglich = [
    [c.advent,'1. Advent'],[addDays(c.advent,7),'2. Advent'],[addDays(c.advent,14),'3. Advent'],[addDays(c.advent,21),'4. Advent'],
    [c.aschermittwoch,'Aschermittwoch'],[c.palmsonntag,'Palmsonntag'],
    [c.gruendonnerstag,'Gründonnerstag'],[c.karfreitag,'Karfreitag'],[c.karsamstag,'Karsamstag'],
    [c.ostern,'Ostersonntag'],[c.ostermontag,'Ostermontag'],
    [c.himmelfahrt,'Christi Himmelfahrt'],[c.pfingsten,'Pfingstsonntag'],
    [c.pfingstmontag,'Pfingstmontag'],[c.trinitatis,'Trinitatis'],
  ];
  for(const [dt,label] of beweglich) if(sameDay(date,dt)) return label;
  const fix={'0-1':'Neujahr','0-6':'Epiphanias','10-31':'Reformationstag',
             '11-24':'Heiliger Abend','11-25':'1. Weihnachtstag','11-26':'2. Weihnachtstag','11-31':'Silvester'};
  return fix[`${m}-${d}`]||null;
}

/* ═══════════════════════════════════════════
   EKD-PERIKOPENORDNUNG: WOCHENPSALMEN
   Jede Woche (Mo–So) hat einen Wochenpsalm
   Basis: Sonntag der Woche → Psalm
   ═══════════════════════════════════════════ */

/* Sonntagsnummer im Kirchenjahr bestimmen */
function getSonntagDerWoche(date) {
  // Woche beginnt Montag; finde den Sonntag dieser Woche
  const d = strip(date);
  const wt = d.getDay(); // 0=So,1=Mo,...
  if(wt === 0) return d;
  return addDays(d, 7 - wt); // nächsten Sonntag (ISO week end)
  // Besser: vorherigen Sonntag
}

function getLetztenSonntag(date) {
  const d = strip(date);
  const wt = d.getDay();
  if(wt===0) return d;
  return addDays(d, -wt);
}

  'trinitatis-22': 27,
  'trinitatis-23': 116,
  'trinitatis-24': 98,
  'trinitatis-25': 126,
  'trinitatis-26': 96,
  'trinitatis-27': 90,
  'erntedank': 65,
  'reform': 46,
  'buss': 130,
  'totensonntag': 90,
};

/* TAGESPSALMEN nach Saison (für Wochentage) */
const TAGESPSALMEN = {
  advent:      [122,25,80,85,130,24,72],
  weihnachten: [96,97,98,2,110,113,117],
  epiphanie:   [29,67,72,100,66,19,138],
  fasten:      [51,22,32,31,130,143,69],
  karwoche:    [22,31,88,116,22,88,118],
  ostern:      [118,16,30,23,66,98,150],
  himmelfahrt: [47,110,93,8,24,29,97],
  pfingsten:   [104,139,51,33,29,100,67],
  trinitatis:  [103,121,34,23,91,46,139],
};

/* Wochenpsalm-Schlüssel für ein Datum ermitteln */
function getWochenpsalmNr(date) {
  const y=date.getFullYear();
  const c=kirchenDaten(y), p=kirchenDaten(y-1);
  const d=strip(date);

  // Besondere Einzeltage
  if(sameDay(d, c.karfreitag))    return WOCHENPSALMEN['karwoche-fr']||22;
  if(sameDay(d, c.gruendonnerstag)) return WOCHENPSALMEN['karwoche-do']||116;
  if(sameDay(d, c.karsamstag))    return WOCHENPSALMEN['karwoche-sa']||88;

  const so = getLetztenSonntag(date);
  const saison = getSaison(d);

  if(saison.key==='advent') {
    const woche=Math.floor((so-c.advent)/604800000)+1;
    return WOCHENPSALMEN[`advent-${Math.min(woche,4)}`]||25;
  }
  if(saison.key==='weihnachten') {
    const woche=Math.floor((so-saison.start)/604800000)+1;
    return WOCHENPSALMEN[`weihnachten-${Math.min(woche,5)}`]||96;
  }
  if(saison.key==='epiphanie') {
    const woche=Math.floor((so-c.epiphanie)/604800000)+1;
    return WOCHENPSALMEN[`epiphanie-${Math.min(woche,6)}`]||29;
  }
  if(saison.key==='fasten') {
    const woche=Math.floor((so-c.aschermittwoch)/604800000)+1;
    return WOCHENPSALMEN[`fasten-${Math.min(woche,6)}`]||51;
  }
  if(saison.key==='karwoche') {
    return 22;
  }
  if(saison.key==='ostern') {
    const woche=Math.floor((so-c.ostern)/604800000)+1;
    return WOCHENPSALMEN[`ostern-${Math.min(woche,7)}`]||118;
  }
  if(saison.key==='himmelfahrt') {
    return WOCHENPSALMEN['ostern-7']||47;
  }
  if(saison.key==='pfingsten') {
    return WOCHENPSALMEN['pfingsten-1']||104;
  }
  // Trinitatis
  const woche=Math.floor((so-c.trinitatis)/604800000)+1;
  return WOCHENPSALMEN[`trinitatis-${Math.min(woche,27)}`]||103;
}

/* Tagespsalm */
function getTagespsalmNr(date) {
  const saison=getSaison(date);
  const pool=TAGESPSALMEN[saison.key]||TAGESPSALMEN.trinitatis;
  return pool[date.getDay()];
}

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
let aktuellDatum = strip(new Date());
let aktivIdx     = null;
let tagsPsalmen  = [0, 0];

/* ═══════════════════════════════════════════
   RENDER FUNKTIONEN
   ═══════════════════════════════════════════ */
function renderDatum(datum) {
  document.getElementById('date-weekday').textContent = WOCHENTAGE[datum.getDay()];
  const ist = sameDay(datum, new Date());
  document.getElementById('date-main').innerHTML =
    `${datum.getDate()}. ${MONATE[datum.getMonth()]} ${datum.getFullYear()}`
    + (ist ? '<span class="today-chip">Heute</span>' : '');
  document.getElementById('btn-today').disabled = ist;
}

function renderSaison(saison) {
  document.getElementById('season-ribbon').textContent = saison.name;
  const app = document.getElementById('app');
  Object.values(SAISON_META).forEach(m => app.classList.remove(m.cls));
  app.classList.add(saison.cls);
  // Update top bar color
  document.querySelector('.psalm-container::before');
}

function renderBesonderer(datum) {
  const el = document.getElementById('special-day');
  const name = getBesondererTag(datum);
  if(name){ el.textContent='✦ '+name+' ✦'; el.style.display='block'; }
  else { el.style.display='none'; }
}

function renderButtons() {
  const nrW = tagsPsalmen[0];
  const nrT = tagsPsalmen[1];
  document.getElementById('pnum-0').textContent = nrW;
  document.getElementById('pnum-1').textContent = nrT;
  document.getElementById('phint-0').textContent = nrW===nrT ? 'Heute ident mit Tagesps.' : 'Perikopenordnung';
  document.getElementById('phint-1').textContent = 'Kirchenjahr · '+WOCHENTAGE[aktuellDatum.getDay()];
  for(let i=0;i<2;i++) document.getElementById(`pbtn-${i}`).classList.remove('active');
}

function zeigeAuswahl() {
  document.getElementById('psalm-content').innerHTML = `
    <div class="state-placeholder">
      <div class="icon">✦</div>
      <p>Wähle einen Psalm<br>um ihn zu lesen</p>
      <span class="hint">Tasten 1 · 2</span>
    </div>`;
}

/* ═══════════════════════════════════════════
   PSALM ANZEIGEN
   ═══════════════════════════════════════════ */
function selectPsalm(idx) {
  if(aktivIdx===idx) return;
  aktivIdx=idx;
  for(let i=0;i<2;i++) document.getElementById(`pbtn-${i}`).classList.toggle('active',i===idx);

  const nr = tagsPsalmen[idx];
  const psalm = PSALMEN[nr];
  const type = idx===0 ? 'Wochenpsalm' : 'Tagespsalm';

  if(!psalm) {
    document.getElementById('psalm-content').innerHTML = `
      <div class="state-placeholder">
        <div class="icon">✦</div>
        <p>Psalm ${nr} ist in dieser Version<br>noch nicht enthalten.</p>
      </div>`;
    return;
  }

  const verseHtml = psalm.v.map((v,i) => `
    <div class="psalm-verse" style="animation-delay:${Math.min(i*15,600)}ms">
      <span class="vnum">${v[0]}</span>
      <span class="vtext">${esc(v[1])}</span>
    </div>`).join('');

  const supHtml = psalm.sup ? `<div class="psalm-sup">${esc(psalm.sup)}</div>` : '';

  document.getElementById('psalm-content').innerHTML = `
    <div class="psalm-inner">
      <div class="psalm-header">
        <div class="psalm-label">Psalm</div>
        <div class="psalm-num">${nr}</div>
        ${supHtml}
        <span class="psalm-badge">${type}</span>
      </div>
      <div>${verseHtml}</div>
    </div>`;
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
function navigiereTo(datum) {
  aktuellDatum = strip(datum);
  aktivIdx = null;
  const saison = getSaison(aktuellDatum);
  tagsPsalmen  = [getWochenpsalmNr(aktuellDatum), getTagespsalmNr(aktuellDatum)];

  renderDatum(aktuellDatum);
  renderSaison(saison);
  renderBesonderer(aktuellDatum);
  renderButtons();
  zeigeAuswahl();
}

function goToday() { navigiereTo(new Date()); }

document.getElementById('btn-prev').addEventListener('click',()=>navigiereTo(addDays(aktuellDatum,-1)));
document.getElementById('btn-next').addEventListener('click',()=>navigiereTo(addDays(aktuellDatum,1)));

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='ArrowLeft')  navigiereTo(addDays(aktuellDatum,-1));
  if(e.key==='ArrowRight') navigiereTo(addDays(aktuellDatum,1));
  if(e.key==='1') selectPsalm(0);
  if(e.key==='2') selectPsalm(1);
  if(e.key==='t'||e.key==='T') goToday();
});

navigiereTo(new Date());

/* ═══ LIGHT/DARK TOGGLE ═══ */
const themeBtn = document.getElementById('btn-theme');
function applyTheme(light) {
  document.documentElement.classList.toggle('light', light);
  document.body.classList.toggle('light', light);
  themeBtn.textContent = light ? '☾' : '☀︎';
  themeBtn.title = light ? 'Dunkelmodus (Taste D)' : 'Hellmodus (Taste D)';
  try { localStorage.setItem('ps-theme', light ? 'light' : 'dark'); } catch(_){}
}
themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('light')));
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='d'||e.key==='D') applyTheme(!document.body.classList.contains('light'));
});
try {
  const saved = localStorage.getItem('ps-theme');
  if(saved==='light') applyTheme(true);
} catch(_){}

</script>
